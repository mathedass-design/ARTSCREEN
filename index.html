<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/png" href="logo.png">
    <link rel="apple-touch-icon" href="logo.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARTSCREEN CORURIPE - Orçamentos</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            box-sizing: border-box;
            
            /* CONFIGURAÇÃO DA SUA NOVA IMAGEM DE FUNDO */
            background-color: #f5f5f5;
            background-image: url('fundo.png');
            background-repeat: no-repeat;
            background-position: center center;
            background-attachment: fixed;
            background-size: cover; /* Faz a imagem cobrir toda a área cinza perfeitamente */
        }

        .container {
            background-color: #ffffff;
            width: 100%;
            max-width: 650px;
            padding: 30px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
            box-sizing: border-box;
            margin-bottom: 20px;
            position: relative;
            z-index: 1;
        }

        h1 {
            font-size: 24px;
            font-weight: bold;
            margin-top: 0;
            margin-bottom: 20px;
            text-transform: uppercase;
            color: #000;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .checkbox-group {
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            font-size: 15px;
            font-weight: bold;
            user-select: none;
        }

        .checkbox-group input {
            width: 18px;
            height: 18px;
            cursor: pointer;
        }

        .header-field {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 5px;
        }

        label {
            font-size: 16px;
            color: #333;
            font-weight: bold;
        }

        .btn-limpar-campo {
            background: none;
            border: none;
            font-size: 18px;
            cursor: pointer;
            padding: 2px 8px;
            opacity: 0.7;
            transition: opacity 0.2s;
        }

        .btn-limpar-campo:hover {
            opacity: 1;
        }

        .itens-lista {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 15px;
        }

        .item-linha {
            display: flex;
            align-items: center;
            gap: 8px;
            background-color: #fafafa;
            padding: 10px;
            border: 1px solid #ddd;
            box-sizing: border-box;
        }

        .col-qtd { width: 15%; }
        .col-desc { width: 45%; }
        .col-valor { width: 20%; }
        .col-total { 
            width: 15%; 
            font-size: 14px; 
            font-weight: bold; 
            color: #333;
            text-align: right;
            white-space: nowrap;
        }
        .col-acao { width: 5%; text-align: center; }

        .btn-add-item {
            background-color: #fff;
            border: 1px solid #000;
            color: #000;
            padding: 8px 15px;
            font-size: 14px;
            cursor: pointer;
            font-weight: bold;
            width: auto;
            margin-bottom: 20px;
        }

        .btn-add-item:hover {
            background-color: #f0f0f0;
        }

        .btn-remover-linha {
            background: none;
            border: none;
            color: #cc0000;
            cursor: pointer;
            font-size: 18px;
            font-weight: bold;
            padding: 4px;
        }

        input[type="text"], input[type="number"] {
            width: 100%;
            padding: 8px;
            border: 1px solid #999;
            border-radius: 0px;
            font-size: 15px;
            box-sizing: border-box;
            font-family: inherit;
        }

        .totais-container {
            margin-top: 15px;
            margin-bottom: 20px;
            font-size: 16px;
            line-height: 1.6;
        }

        .total-destaque {
            font-size: 22px;
            font-weight: bold;
            margin-top: 5px;
        }

        button.btn-copiar {
            width: 100%;
            border: 1px solid #999;
            color: #000;
            padding: 12px;
            font-size: 15px;
            cursor: pointer;
            transition: background 0.2s;
            font-weight: bold;
            background-color: #e0e0e0;
        }

        button.btn-copiar:hover {
            background-color: #d4d4d4;
        }

        /* REGRAS EXCLUSIVAS PARA CELULAR */
        @media (max-width: 600px) {
            body {
                padding: 10px;
                background-image: none; /* Mantém limpo no celular */
                background-color: #f5f5f5;
            }
            .container {
                padding: 15px;
                box-shadow: none;
            }
            .item-linha {
                display: grid;
                grid-template-columns: 1fr 1fr;
                gap: 10px;
                padding: 12px;
            }
            .col-desc { 
                grid-column: span 2;
                width: 100%; 
            }
            .col-qtd { width: 100%; }
            .col-valor { width: 100%; }
            
            .linha-mobile-total-remover {
                grid-column: span 2;
                display: flex;
                justify-content: space-between;
                align-items: center;
                border-top: 1px dashed #ddd;
                padding-top: 8px;
                margin-top: 2px;
            }
            .col-total { 
                width: auto; 
                text-align: left;
            }
            .col-acao { 
                width: auto; 
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>ARTSCREEN CORURIPE</h1>

        <label class="checkbox-group">
            <input type="checkbox" id="incluirDadosLoja">
            Inserir informações da loja (CNPJ e Endereço)
        </label>

        <div class="form-group">
            <div class="header-field">
                <label for="cliente">Cliente</label>
                <button class="btn-limpar-campo" onclick="limparCliente()" title="Limpar Nome">🗑️</button>
            </div>
            <input type="text" id="cliente" placeholder="">
        </div>

        <div class="form-group">
            <div class="header-field">
                <label>Serviços / Produtos</label>
                <button class="btn-limpar-campo" onclick="limparTodosItens()" title="Limpar Todos os Itens">🗑️</button>
            </div>
            
            <div class="itens-lista" id="conteudoItens">
                <!-- Linhas inseridas dinamicamente -->
            </div>

            <button type="button" class="btn-add-item" onclick="adicionarNovaLinha()">➕ Adicionar Item</button>
        </div>

        <div class="form-group">
            <div class="header-field">
                <label for="desconto">Desconto</label>
                <button class="btn-limpar-campo" onclick="limparDesconto()" title="Limpar Desconto">🗑️</button>
            </div>
            <input type="number" id="desconto" value="0" min="0" step="any" oninput="calcularOrcamento()">
        </div>

        <div class="totais-container" id="painelTotais">
            <!-- Gerado dinamicamente via JS -->
        </div>

        <button class="btn-copiar" onclick="copyToWhatsApp()">Copiar para WhatsApp</button>
    </div>

    <script>
        if (!localStorage.getItem('numeroOrcamento')) {
            localStorage.setItem('numeroOrcamento', '1');
        }

        const conteudoItens = document.getElementById('conteudoItens');
        const descontoInput = document.getElementById('desconto');
        const painelTotais = document.getElementById('painelTotais');
        const clienteInput = document.getElementById('cliente');

        adicionarNovaLinha();

        function formatarNumeroOrcamento(num) {
            return String(num).padStart(4, '0');
        }

        function formatarMoeda(valor) {
            return valor.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
        }

        function adicionarNovaLinha(qtd = '', desc = '', valor = '') {
            const containerLinha = document.createElement('div');
            containerLinha.className = 'item-linha';
            containerLinha.innerHTML = `
                <div class="col-desc"><input type="text" class="ipt-desc" value="${desc}" placeholder="Serviço / Produto"></div>
                <div class="col-qtd"><input type="number" class="ipt-qtd" value="${qtd}" placeholder="Qtd" min="1" oninput="atualizarSubtotalLinha(this)"></div>
                <div class="col-valor"><input type="number" class="ipt-valor" value="${valor}" placeholder="Valor Unit." min="0" step="any" oninput="atualizarSubtotalLinha(this)"></div>
                <div class="linha-mobile-total-remover">
                    <div class="col-total">Total: R$ 0,00</div>
                    <div class="col-acao"><button type="button" class="btn-remover-linha" onclick="removerLinha(this)">❌</button></div>
                </div>
            `;
            conteudoItens.appendChild(containerLinha);
            
            if(qtd && valor) {
                const iptQtd = containerLinha.querySelector('.ipt-qtd');
                atualizarSubtotalLinha(iptQtd);
            } else {
                calcularOrcamento();
            }
        }

        function removerLinha(botao) {
            botao.closest('.item-linha').remove();
            calcularOrcamento();
        }

        function atualizarSubtotalLinha(input) {
            const linha = input.closest('.item-linha');
            const qtd = parseFloat(linha.querySelector('.ipt-qtd').value) || 0;
            const valor = parseFloat(linha.querySelector('.ipt-valor').value) || 0;
            const totalLinhaElemento = linha.querySelector('.col-total');
            
            totalLinhaElemento.innerText = 'Total: ' + formatarMoeda(qtd * valor);
            calcularOrcamento();
        }

        function calcularOrcamento() {
            let subtotalOriginal = 0;
            const lines = conteudoItens.querySelectorAll('.item-linha');

            lines.forEach(linha => {
                const qtd = parseFloat(linha.querySelector('.ipt-qtd').value) || 0;
                const valor = parseFloat(linha.querySelector('.ipt-valor').value) || 0;
                subtotalOriginal += (qtd * valor);
            });

            const desconto = parseFloat(descontoInput.value) || 0;
            let htmlTotais = '';

            if (desconto > 0) {
                const totalComDesconto = Math.max(0, subtotalOriginal - desconto);
                htmlTotais += `<div>VALOR SEM DESCONTO: ${formatarMoeda(subtotalOriginal)}</div>`;
                htmlTotais += `<div>DESCONTO: ${formatarMoeda(desconto)}</div>`;
                htmlTotais += `<div class="total-destaque">TOTAL COM DESCONTO: ${formatarMoeda(totalComDesconto)}</div>`;
            } else {
                htmlTotais += `<div class="total-destaque">TOTAL: ${formatarMoeda(subtotalOriginal)}</div>`;
            }

            painelTotais.innerHTML = htmlTotais;
        }

        function limparCliente() {
            clienteInput.value = '';
            clienteInput.focus();
        }

        function limparTodosItens() {
            conteudoItens.innerHTML = '';
            adicionarNovaLinha();
            calcularOrcamento();
        }

        function limparDesconto() {
            descontoInput.value = '0';
            calcularOrcamento();
        }

        function obterDataHoraAtual() {
            const agora = new Date();
            const data = agora.toLocaleDateString('pt-BR');
            const hora = agora.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
            return { data, hora };
        }

        function copyToWhatsApp() {
            const cliente = clienteInput.value.trim() || "Não informado";
            const desconto = parseFloat(descontoInput.value) || 0;
            const incluirDados = document.getElementById('incluirDadosLoja').checked;
            
            const numAtual = parseInt(localStorage.getItem('numeroOrcamento'), 10);
            const orcamentoFormatado = formatarNumeroOrcamento(numAtual);
            const { data, hora } = obterDataHoraAtual();

            let mensagem = `*Orçamento:* #${orcamentoFormatado}\n`;
            mensagem += `*Data:* ${data} às ${hora}\n`;
            mensagem += `*Cliente:* ${cliente}\n`;
            mensagem += `----------------------------------------\n`;
            
            let subtotalOriginal = 0;
            const lines = conteudoItens.querySelectorAll('.item-linha');

            lines.forEach(linha => {
                const qtd = parseFloat(linha.querySelector('.ipt-qtd').value) || 0;
                const descricao = linha.querySelector('.ipt-desc').value.trim() || "Item sem descrição";
                const valorUnitario = parseFloat(linha.querySelector('.ipt-valor').value) || 0;

                if (qtd > 0 && valorUnitario > 0) {
                    const totalItem = qtd * valorUnitario;
                    subtotalOriginal += totalItem;
                    mensagem += `${qtd}x ${descricao} (${formatarMoeda(valorUnitario)} cada) = ${formatarMoeda(totalItem)}\n`;
                }
            });

            mensagem += `----------------------------------------\n`;

            if (desconto > 0) {
                const totalComDesconto = Math.max(0, subtotalOriginal - desconto);
                mensagem += `*VALOR SEM DESCONTO:* ${formatarMoeda(subtotalOriginal)}\n`;
                mensagem += `*DESCONTO:* ${formatarMoeda(desconto)}\n`;
                mensagem += `*TOTAL COM DESCONTO:* ${formatarMoeda(totalComDesconto)}\n`;
            } else {
                mensagem += `*TOTAL:* ${formatarMoeda(subtotalOriginal)}\n`;
            }

            mensagem += `----------------------------------------\n`;
            mensagem += `*ARTSCREEN CORURIPE*\n`;

            if (incluirDados) {
                mensagem += `CNPJ: 25.974.730/0001-14\n`;
                mensagem += `Av. Floriano Peixoto, 138, Centro, Coruripe - AL\n`;
            }

            navigator.clipboard.writeText(mensagem).then(() => {
                alert(`Orçamento #${orcamentoFormatado} copiado com sucesso!`);
                localStorage.setItem('numeroOrcamento', numAtual + 1);
            }).catch(err => {
                alert('Erro ao copiar o texto.');
            });
        }
    </script>
</body>
</html>
